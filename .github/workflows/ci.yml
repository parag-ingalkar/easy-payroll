name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        working-directory: backend
        run: |
          uv sync --locked

      - name: Ruff check
        working-directory: backend
        run: |
          uv run ruff check .

      - name: Ruff format check
        working-directory: backend
        run: |
          uv run ruff format --check .

      - name: Pyright
        working-directory: backend
        run: |
          uv run pyright